<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | B&B Marble, Inc.</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #1a1a1a;
            --brand-white: #ffffff;
            --overlay-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--brand-white);
            color: var(--brand-dark);
            margin: 0;
            padding: 0;
        }

        /* 2. Home Navigation Button */
        .nav-header {
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start;
        }

        .back-home {
            text-decoration: none;
            color: var(--brand-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--brand-dark);
            padding-bottom: 4px;
            transition: opacity 0.3s;
        }

        .back-home:hover {
            opacity: 0.6;
        }

        .gallery-header {
            text-align: center;
            padding: 20px 20px 40px;
        }

        .gallery-header h1 {
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* 1. Filter Navigation */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 8px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--brand-dark);
            color: white;
            border-color: var(--brand-dark);
        }

        /* 4. Four Column Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Force 4 columns */
            gap: 10px;
            padding: 0 10px 60px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Square look for precision */
            background-color: #f9f9f9;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* 3. Hover Caption (Bottom Only) */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Fixed height for bottom only */
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(100%); /* Start off-screen */
            transition: all 0.4s ease;
            color: white;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
            transform: translateY(0); /* Slide up into view */
        }

        .overlay h3 {
            font-size: 12px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .overlay p {
            font-size: 10px;
            margin: 2px 0 0;
            opacity: 0.8;
        }

        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-home">← Back to Home</a>
    </header>

    <section class="gallery-header">
        <h1>Projects</h1>
        <div class="filter-nav" id="filter-buttons">
            <button class="filter-btn active" onclick="filterGallery('all')">View All</button>
        </div>
    </section>

    <main class="gallery-grid" id="gallery-container"></main>

    <script>
        let allData = [];

        async function loadGallery() {
            try {
                const response = await fetch('gallery-data.json');
                allData = await response.json();
                renderFilters();
                renderGallery('all');
            } catch (err) {
                console.error("Data load failed:", err);
            }
        }

        function renderFilters() {
            const container = document.getElementById('filter-buttons');
            // Extracts unique categories from your 339 photos
            const categories = [...new Set(allData.map(item => item.category))].sort();
            
            categories.forEach(cat => {
                if (cat && cat !== 'all') {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = cat;
                    btn.onclick = () => filterGallery(cat);
                    container.appendChild(btn);
                }
            });
        }

        function renderGallery(filter) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';

            const filtered = filter === 'all' 
                ? allData 
                : allData.filter(item => item.category === filter);

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${item.src}" alt="${item.city}">
                    <div class="overlay">
                        <h3>${item.city}</h3>
                        <p>${item.year}</p>
                    </div>
                `;
                container.appendChild(div);
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === filter.toLowerCase());
            });
        }

        function filterGallery(category) {
            renderGallery(category);
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
