<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | B&B Marble, Inc.</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #1a1a1a;
            --brand-white: #ffffff;
            --overlay-bg: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--brand-white);
            color: var(--brand-dark);
            margin: 0;
            padding: 0;
        }

        /* Home Navigation Button */
        .nav-header {
            padding: 30px 40px;
            display: flex;
            justify-content: flex-start;
        }

        .back-home {
            text-decoration: none;
            color: var(--brand-dark);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--brand-dark);
            padding-bottom: 4px;
            transition: opacity 0.3s;
        }

        .back-home:hover {
            opacity: 0.5;
        }

        .gallery-header {
            text-align: center;
            padding: 0 20px 40px;
        }

        .gallery-header h1 {
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Filter Navigation */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 10px 22px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--brand-dark);
            color: white;
            border-color: var(--brand-dark);
        }

        /* Four Column Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 12px 60px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background-color: #f5f5f5;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Hover Caption (Bottom Only) */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.4s ease-out;
            color: white;
            pointer-events: none;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .overlay h3 {
            font-size: 13px;
            margin: 0;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .overlay p {
            font-size: 11px;
            margin: 4px 0 0;
            font-weight: 300;
            opacity: 0.8;
        }

        /* Tablet/Mobile Adjustments */
        @media (max-width: 1100px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .nav-header { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="index.html" class="back-home">← Back to Home</a>
    </header>

    <section class="gallery-header">
        <h1>Projects</h1>
        <div class="filter-nav" id="filter-buttons">
            <button class="filter-btn active" onclick="filterGallery('all')">View All</button>
        </div>
    </section>

    <main class="gallery-grid" id="gallery-container"></main>

    <script>
        let allData = [];

        async function loadGallery() {
            try {
                const response = await fetch('gallery-data.json');
                allData = await response.json();
                renderFilters();
                renderGallery('all');
            } catch (err) {
                console.error("Critical: Could not load gallery data.", err);
            }
        }

        function renderFilters() {
            const container = document.getElementById('filter-buttons');
            // Uses 'filter_tag' to match your JSON data
            const categories = [...new Set(allData.map(item => item.filter_tag))].sort();
            
            categories.forEach(cat => {
                if (cat && cat.toLowerCase() !== 'all') {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = cat;
                    btn.onclick = () => filterGallery(cat);
                    container.appendChild(btn);
                }
            });
        }

        function renderGallery(filter) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';

            const filtered = filter === 'all' 
                ? allData 
                : allData.filter(item => item.filter_tag === filter);

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                
                // Cleans up the " _" from your location strings automatically
                const cleanLocation = (item.location || "").replace(/_/g, "").trim();
                const displayYear = item.year || "";

                div.innerHTML = `
                    <img src="${item.src}" alt="${cleanLocation}">
                    <div class="overlay">
                        <h3>${cleanLocation}</h3>
                        <p>${displayYear}</p>
                    </div>
                `;
                container.appendChild(div);
            });

            // Handle active button state
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnText = btn.textContent.toLowerCase();
                const isActive = (filter === 'all' && btnText === 'view all') || (btnText === filter.toLowerCase());
                btn.classList.toggle('active', isActive);
            });
        }

        function filterGallery(category) {
            renderGallery(category);
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
