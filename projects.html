<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | B&B Marble, Inc.</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-buttons { text-align: center; margin: 20px 0; }
        .filter-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: white; margin: 5px; text-transform: capitalize; }
        .filter-btn.active { background: #333; color: white; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .gallery-item { position: relative; overflow: hidden; height: 300px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .caption { position: absolute; bottom: -100%; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 15px; transition: 0.3s; }
        .gallery-item:hover .caption { bottom: 0; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
    </nav>

    <div class="filter-buttons" id="filter-buttons">
        <button class="filter-btn active" onclick="filterGallery('all')">All</button>
    </div>

    <div class="gallery-grid" id="gallery-grid"></div>

    <script>
        // Load the map created by your Python script
        fetch('gallery-data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('gallery-grid');
                const btnContainer = document.getElementById('filter-buttons');
                const rooms = new Set();

                data.forEach(item => {
                    rooms.add(item.filter_tag);
                    
                    const div = document.createElement('div');
                    div.className = `gallery-item ${item.filter_tag}`;
                    div.innerHTML = `
                        <img src="${item.src}" alt="${item.location}">
                        <div class="caption">
                            <strong>${item.location}</strong><br>
                            ${item.year}
                        </div>
                    `;
                    grid.appendChild(div);
                });

                // Create buttons for each room type found
                rooms.forEach(room => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = room;
                    btn.onclick = () => filterGallery(room);
                    btnContainer.appendChild(btn);
                });
            });

        function filterGallery(tag) {
            const items = document.querySelectorAll('.gallery-item');
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if (tag === 'all' || item.classList.contains(tag)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
