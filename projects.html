<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | B&B Marble, Inc.</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1e293b;
            --light: #f8f5f2;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--light); color: var(--dark); margin: 0; }
        
        /* Header & Intro */
        .gallery-header { padding: 140px 20px 40px; text-align: center; background: white; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; color: var(--dark); }
        .gallery-header p { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-top: 10px; }

        /* Filter System */
        .filter-wrapper { position: sticky; top: 70px; z-index: 100; background: rgba(248, 245, 242, 0.95); padding: 20px 0; border-bottom: 1px solid #e2e8f0; backdrop-filter: blur(10px); }
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; max-width: 1200px; margin: 0 auto; }
        .filter-btn { background: none; border: 1px solid var(--dark); padding: 10px 25px; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; font-weight: 600; }
        .filter-btn.active, .filter-btn:hover { background: var(--dark); color: white; border-color: var(--dark); }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1600px; margin: 0 auto; }
        .gallery-item { position: relative; height: 500px; overflow: hidden; background: #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .gallery-item:hover img { transform: scale(1.08); }
        
        /* Hover Overlay */
        .item-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 41, 59, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.5s; color: white; text-align: center; }
        .gallery-item:hover .item-overlay { opacity: 1; }
        .item-overlay h3 { font-family: 'Playfair Display'; font-size: 1.8rem; margin: 0; transform: translateY(20px); transition: 0.5s; }
        .item-overlay p { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; transform: translateY(20px); transition: 0.5s 0.1s; color: var(--gold); }
        .gallery-item:hover h3, .gallery-item:hover p { transform: translateY(0); }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav id="nav">
        <ul class="nav-links">
            <li><a href="index.html#about"><span class="en">About</span><span class="zh-text">关于我们</span></a></li>
            <li><a href="index.html#gallery"><span class="en">Gallery</span><span class="zh-text">项目案例</span></a></li>
            <li><a href="projects.html" style="color: var(--gold);"><span class="en">Projects</span><span class="zh-text">所有项目</span></a></li>
            <li><a href="index.html#services"><span class="en">Services</span><span class="zh-text">服务项目</span></a></li>
            <li><a href="index.html#contact"><span class="en">Contact</span><span class="zh-text">联系我们</span></a></li>
        </ul>
    </nav>

    <header class="gallery-header">
        <h1><span class="en">Portfolio</span><span class="zh-text">项目作品</span></h1>
        <p><span class="en">Fine Stone Fabrication & Installation</span><span class="zh-text">精细石材加工与安装</span></p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-container" id="filter-buttons">
            <button class="filter-btn active" onclick="filterGallery('all', this)">All Projects</button>
        </div>
    </div>

    <div class="gallery-grid" id="gallery-grid">
        <!-- Images load here from JSON -->
    </div>

    <script>
        fetch('gallery-data.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('gallery-grid');
                const btnContainer = document.getElementById('filter-buttons');
                const roomTypes = new Set();

                data.forEach(item => {
                    roomTypes.add(item.filter_tag);
                    const card = document.createElement('div');
                    card.className = `gallery-item ${item.filter_tag}`;
                    card.innerHTML = `
                        <img src="${item.src}" loading="lazy">
                        <div class="item-overlay">
                            <h3>${item.location}</h3>
                            <p>${item.year}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Generate dynamic buttons from your tags
                Array.from(roomTypes).sort().forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = tag.charAt(0).toUpperCase() + tag.slice(1);
                    btn.onclick = (e) => filterGallery(tag, e.target);
                    btnContainer.appendChild(btn);
                });
            });

        function filterGallery(tag, btn) {
            // Update active button state
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filter images
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.style.display = (tag === 'all' || item.classList.contains(tag)) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
